interface:
  display_name: "Bringing Codex To Figma"
  short_description: "Route-to-Figma capture with hard confirmation gates"
  default_prompt: "Use $bringing-codex-to-figma to capture all routes/views into Figma with mandatory pre-flight and plan confirmation gates, README-first server startup, and foreground execution by default."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"

policy:
  allow_implicit_invocation: false
