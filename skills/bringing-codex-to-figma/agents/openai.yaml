interface:
  display_name: "Bringing Codex To Figma"
  short_description: "Capture app routes into Figma with structured pre-flight and parallel workstreams"
  default_prompt: "Use $bringing-codex-to-figma to ask structured pre-flight questions, discover routes or SPA views in parallel, prepare browser tabs, capture the screens into Figma, and group captured frames into sections."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"

policy:
  allow_implicit_invocation: false
