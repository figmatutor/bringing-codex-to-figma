interface:
  display_name: "Bringing Codex To Figma"
  short_description: "Route/view capture orchestration into Figma"
  default_prompt: "Use $bringing-codex-to-figma to orchestrate route/view discovery, browser/CDP capture execution, and upload/grouping flow. Load $figma-use first for any generic Figma write/validation/recovery rules."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"

policy:
  allow_implicit_invocation: false
