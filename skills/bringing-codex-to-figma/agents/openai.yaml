interface:
  display_name: "Bringing Codex To Figma"
  short_description: "Capture web app views into Figma"
  default_prompt: "Use $bringing-codex-to-figma to capture web app routes or views into Figma step by step. Load $figma-use first for any generic Figma write or recovery rules."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"

policy:
  allow_implicit_invocation: false
