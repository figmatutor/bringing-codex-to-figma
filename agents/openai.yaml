interface:
  display_name: "Bringing Codex To Figma"
  short_description: "Batch-capture app screens into organized Figma frames"
  default_prompt: "Use $bringing-codex-to-figma to discover app routes or SPA views, prepare browser tabs, and capture the screens into Figma."

dependencies:
  tools:
    - type: "mcp"
      value: "figma"
      description: "Figma MCP server"
      transport: "streamable_http"
      url: "https://mcp.figma.com/mcp"

policy:
  allow_implicit_invocation: false
